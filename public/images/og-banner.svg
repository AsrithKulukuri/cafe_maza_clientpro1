<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0B"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0B0B0B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#CFAF63" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CFAF63"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="24" fill="none" stroke="#CFAF63" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Grill illustration (right side) -->
  <g transform="translate(780, 150)" opacity="0.35">
    <!-- Grate -->
    <line x1="40" y1="80" x2="360" y2="80" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="120" x2="360" y2="120" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="160" x2="360" y2="160" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="50" x2="100" y2="190" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <line x1="160" y1="50" x2="160" y2="190" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <line x1="220" y1="50" x2="220" y2="190" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <line x1="300" y1="50" x2="300" y2="190" stroke="#CFAF63" stroke-width="6" stroke-linecap="round"/>
    <!-- Flames -->
    <path d="M 155 45 Q 165 10 175 35 Q 185 8 195 40 Q 210 15 200 55 Q 190 75 175 68 Q 160 75 150 55 Q 140 20 155 45 Z" fill="#FF6A00" opacity="0.9"/>
    <path d="M 162 47 Q 168 25 175 40 Q 182 25 188 47 Q 194 32 190 60 Q 183 70 175 68 Q 167 70 160 60 Q 156 32 162 47 Z" fill="#CFAF63"/>
    <!-- Legs -->
    <line x1="100" y1="188" x2="80" y2="280" stroke="#CFAF63" stroke-width="8" stroke-linecap="round"/>
    <line x1="300" y1="188" x2="320" y2="280" stroke="#CFAF63" stroke-width="8" stroke-linecap="round"/>
    <line x1="200" y1="188" x2="200" y2="285" stroke="#CFAF63" stroke-width="8" stroke-linecap="round"/>
    <line x1="72" y1="280" x2="328" y2="280" stroke="#CFAF63" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Left: text content -->
  <!-- Eyebrow -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="22" fill="#CFAF63" letter-spacing="8" text-anchor="start" font-weight="400">HYDERABAD • EST. 2020</text>

  <!-- Main title -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="96" fill="#F5F5F5" font-weight="700" text-anchor="start">Café Maza</text>

  <!-- Gold divider line -->
  <rect x="80" y="330" width="380" height="3" rx="2" fill="url(#goldGrad)"/>

  <!-- Tagline -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="28" fill="#F5F5F5" fill-opacity="0.7" text-anchor="start">Ultra-Premium Live Grill Restaurant</text>

  <!-- Sub-features -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="21" fill="#CFAF63" fill-opacity="0.85" letter-spacing="2">Live Grill  •  Tandoori  •  Dum Biryani  •  Private Screening</text>

  <!-- Bottom URL pill -->
  <rect x="80" y="510" width="280" height="44" rx="22" fill="#CFAF63" fill-opacity="0.12" stroke="#CFAF63" stroke-width="1" stroke-opacity="0.4"/>
  <text x="220" y="539" font-family="Arial, sans-serif" font-size="18" fill="#CFAF63" text-anchor="middle" letter-spacing="1">cafemaza.vercel.app</text>
</svg>
