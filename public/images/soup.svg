  <ellipse cx='800' cy='560' rx='300' ry='165' fill='rgba(0,0,0,0.24)'/>

  <ellipse cx='800' cy='780' rx='560' ry='90' fill='rgba(0,0,0,0.26)' filter='url(#soft)'/>

  <path d='M640 420 C650 380, 670 370, 680 340' stroke='rgba(255,255,255,0.35)' stroke-width='8' fill='none' stroke-linecap='round'/>
  <path d='M760 410 C770 370, 790 360, 800 330' stroke='rgba(255,255,255,0.30)' stroke-width='8' fill='none' stroke-linecap='round'/>
