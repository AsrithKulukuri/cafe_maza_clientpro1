<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='1000' viewBox='0 0 1600 1000'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#151B23'/>
      <stop offset='58%' stop-color='#39526E'/>
      <stop offset='100%' stop-color='#78A6C8'/>
    </linearGradient>
    <radialGradient id='spot' cx='50%' cy='42%' r='44%'>
      <stop offset='0%' stop-color='rgba(255,255,255,0.26)'/>
      <stop offset='100%' stop-color='rgba(255,255,255,0)'/>
    </radialGradient>
    <filter id='soft' x='-20%' y='-20%' width='140%' height='140%'>
      <feGaussianBlur stdDeviation='22'/>
    </filter>
    <pattern id='grain' width='8' height='8' patternUnits='userSpaceOnUse'>
